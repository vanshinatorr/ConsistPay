
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Design ConsistPay Landing Page (Community)</title>
      <link rel="icon" type="image/x-icon" href="/logo/favicon.ico?v=2" />
      <link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32x32.png?v=2" />
      <link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16x16.png?v=2" />
      <link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png?v=2" />
      <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
      <script>
        (function() {
          const theme = localStorage.getItem("app_theme") || localStorage.getItem("admin_theme") || "dark";
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.classList.remove("light");
          } else {
            document.documentElement.classList.add("light");
            document.documentElement.classList.remove("dark");
          }
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
